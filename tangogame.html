<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tango Challenge</title>
  <style>
    :root{--ink:#111827;--orange:#ffad18;--green:#12c994;--good:#16a66f;--bad:#e84e62}
    *{box-sizing:border-box}
    html,body{min-height:100%;width:100%}
    body{
      margin:0;overflow:auto;color:var(--ink);font-family:Inter,Avenir Next,Arial,sans-serif;background:#fff;
    }
    button{font:inherit}
    .game{
      width:100%;height:100dvh;min-height:520px;padding:clamp(14px,2vw,28px) clamp(16px,3vw,42px);
      display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:18px;position:relative;
    }
    .topbar{display:flex;align-items:center;justify-content:flex-end}
    .stats{display:flex;gap:10px}
    .stat{
      min-width:105px;padding:8px 14px;border:2px solid #111;border-radius:999px;
      background:#fff;font-weight:900;text-align:center;
    }
    .board{
      min-height:0;display:grid;grid-template-columns:minmax(260px,.8fr) minmax(460px,1.45fr);
      gap:clamp(28px,6vw,90px);align-items:center;
    }
    .target{height:100%;min-height:0;display:grid;place-items:center;perspective:1200px}
    .card-stage{width:min(390px,82%,48vh);aspect-ratio:4/5;position:relative;transform-style:preserve-3d}
    .card-layer,.target-card{position:absolute;inset:0;width:100%;height:100%;border-radius:8px;border:7px solid #fff;box-shadow:0 10px 0 #111,0 18px 35px rgba(0,0,0,.16)}
    .card-layer{background:var(--green)}
    .card-layer::before{content:"?";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:clamp(90px,11vw,170px);font-weight:950}
    .card-layer:nth-child(1){transform:translate(-34px,-25px) rotate(-3deg)}
    .card-layer:nth-child(2){transform:translate(-22px,-16px) rotate(-2deg)}
    .card-layer:nth-child(3){transform:translate(-11px,-8px) rotate(-1deg)}
    .target-card{display:grid;grid-template-rows:minmax(0,1fr) auto;background:#fff;z-index:4;overflow:hidden}
    .target img{display:block;width:100%;height:100%;min-height:0;object-fit:cover;background:#fff}
    .target-meaning{padding:clamp(12px,2vh,22px) 10px;text-align:center;font-size:clamp(24px,3vw,42px);font-weight:950;text-transform:uppercase;line-height:1.05;background:#fff;border-top:3px solid #111}
    .answers{
      min-width:0;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:clamp(16px,3vh,28px) clamp(18px,2.5vw,36px);align-content:center;
    }
    .answer{
      min-width:0;min-height:clamp(66px,10vh,92px);border:3px solid #111;border-radius:999px;background:var(--orange);
      box-shadow:clamp(5px,1vw,9px) clamp(5px,1vw,9px) 0 #111;display:flex;align-items:center;padding:12px clamp(18px,2.5vw,34px);
      transition:transform .18s ease,box-shadow .18s ease,background .18s ease;
    }
    .key{flex:none;font-size:clamp(22px,2.4vw,38px);font-weight:950;margin-right:clamp(10px,1.4vw,18px)}
    .kana{min-width:0;overflow-wrap:anywhere;font-size:clamp(25px,3vw,46px);font-weight:900;letter-spacing:.04em}
    .answer.selected{transform:translate(5px,5px);box-shadow:4px 4px 0 #111;background:#ffd36f}
    .answer.correct{background:#5bd7a5}
    .answer.wrong{background:#ff7d8c;animation:shake .35s ease}
    .answer:nth-child(2){grid-column:1;grid-row:2}
    .answer:nth-child(3){grid-column:2;grid-row:1}
    .answers.reveal{animation:answersIn .45s .85s both}
    .footer{display:grid;grid-template-columns:1fr minmax(280px,520px) 1fr;align-items:center;gap:18px}
    .status{font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hold{height:14px;background:#e5e7eb;border:2px solid #111;border-radius:999px;overflow:hidden}
    .hold-fill{height:100%;width:0;background:var(--green);transition:width .08s linear}
    .time{text-align:right;font-weight:900;font-variant-numeric:tabular-nums}
    .overlay{
      position:absolute;inset:0;display:none;place-items:center;background:rgba(255,255,255,.9);
      backdrop-filter:blur(5px);z-index:10;
    }
    .overlay.show{display:grid}
    .overlay-card{text-align:center;background:#fff;border:3px solid #111;border-radius:8px;padding:34px 48px;box-shadow:10px 10px 0 #111}
    .overlay-mark{font-size:64px;font-weight:950;color:var(--orange);line-height:1}
    .overlay-title{font-size:30px;font-weight:950;margin-top:10px}
    .release-prompt{
      position:absolute;left:50%;top:50%;z-index:8;display:none;transform:translate(-50%,-50%);
      min-width:min(360px,calc(100vw - 36px));padding:24px 34px;text-align:center;
      background:#fff;border:3px solid #111;border-radius:8px;box-shadow:10px 10px 0 #111;
    }
    .release-prompt.show{display:block;animation:promptIn .28s ease both}
    .round-result{font-size:clamp(20px,2.4vw,30px);font-weight:950;margin-bottom:10px}
    .release-command{font-size:clamp(34px,5vw,58px);font-weight:950;color:#f59e0b;line-height:1}
    .card-stage.shuffle .card-layer:nth-child(1){animation:shuffleOne 1s ease-in-out}
    .card-stage.shuffle .card-layer:nth-child(2){animation:shuffleTwo 1s .08s ease-in-out}
    .card-stage.shuffle .card-layer:nth-child(3){animation:shuffleThree 1s .16s ease-in-out}
    .card-stage.shuffle .target-card{animation:revealCard 1.15s ease both}
    @keyframes shuffleOne{0%,100%{transform:translate(-34px,-25px) rotate(-3deg)}40%{transform:translate(90px,-15px) rotate(13deg)}70%{transform:translate(-70px,10px) rotate(-10deg)}}
    @keyframes shuffleTwo{0%,100%{transform:translate(-22px,-16px) rotate(-2deg)}38%{transform:translate(-100px,-8px) rotate(-14deg)}72%{transform:translate(70px,12px) rotate(8deg)}}
    @keyframes shuffleThree{0%,100%{transform:translate(-11px,-8px) rotate(-1deg)}42%{transform:translate(75px,22px) rotate(10deg)}74%{transform:translate(-55px,-20px) rotate(-7deg)}}
    @keyframes revealCard{0%,65%{opacity:0;transform:rotateY(90deg) scale(.86)}100%{opacity:1;transform:none}}
    @keyframes answersIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
    @keyframes promptIn{from{opacity:0;transform:translate(-50%,-44%) scale(.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    @keyframes shake{25%{transform:translateX(-8px)}50%{transform:translateX(7px)}75%{transform:translateX(-4px)}}
    @media(max-width:900px){
      .game{height:auto;min-height:100dvh}.board{grid-template-columns:1fr;gap:clamp(34px,6vw,54px)}
      .target{height:min(52vh,470px);min-height:310px}.card-stage{width:min(340px,70vw);height:auto}
    }
    @media(max-width:620px){
      .stats{width:100%;justify-content:space-between}.stat{min-width:0;flex:1}
      .target{height:390px;min-height:0}.card-stage{width:min(280px,72vw)}
      .answers{grid-template-columns:1fr;gap:14px}.answer{min-height:68px}.answer:nth-child(n){grid-column:1;grid-row:auto}
      .footer{grid-template-columns:1fr auto;gap:10px}.hold{grid-column:1/-1;grid-row:1}.status{grid-row:2}.time{grid-row:2;text-align:right}
    }
    @media(max-height:650px) and (min-width:901px){
      .game{gap:10px}.card-stage{width:min(300px,42vh)}.answer{min-height:58px}.footer{font-size:14px}
    }
  </style>
</head>
<body>
<main class="game">
  <header class="topbar">
    <div class="stats">
      <div class="stat" id="roundText">0 / 10</div>
      <div class="stat" id="scoreText">0 pts</div>
    </div>
  </header>

  <section class="board">
    <div class="target">
      <div class="card-stage" id="cardStage">
        <div class="card-layer"></div><div class="card-layer"></div><div class="card-layer"></div>
        <div class="target-card">
          <img id="targetImg" alt="">
          <div class="target-meaning" id="targetMeaning">-</div>
        </div>
      </div>
    </div>
    <div class="answers" id="answers"></div>
  </section>

  <footer class="footer">
    <div class="status" id="messageText">RELEASE</div>
    <div class="hold"><div class="hold-fill" id="holdFill"></div></div>
    <div class="time" id="progressText">0.0 / 15 s</div>
  </footer>

  <div class="release-prompt" id="releasePrompt">
    <div class="round-result" id="roundResult"></div>
    <div class="release-command">↑ RELEASE</div>
  </div>

  <div class="overlay show" id="overlay">
    <div class="overlay-card">
      <div class="overlay-mark" id="overlayMark">↑</div>
      <div class="overlay-title" id="overlayTitle">RELEASE</div>
    </div>
  </div>
</main>

<script>
const WS_URL = "ws://127.0.0.1:8765";
const POSE_LABELS = ["A", "B", "C", "D"];
const scoreText = document.getElementById("scoreText");
const roundText = document.getElementById("roundText");
const targetImg = document.getElementById("targetImg");
const targetMeaning = document.getElementById("targetMeaning");
const cardStage = document.getElementById("cardStage");
const answers = document.getElementById("answers");
const progressText = document.getElementById("progressText");
const holdFill = document.getElementById("holdFill");
const messageText = document.getElementById("messageText");
const releasePrompt = document.getElementById("releasePrompt");
const roundResult = document.getElementById("roundResult");
const overlay = document.getElementById("overlay");
const overlayMark = document.getElementById("overlayMark");
const overlayTitle = document.getElementById("overlayTitle");

let shuffleRound = -1;
let answerSignature = "";
let targetPath = "";

function shuffleTarget(path){
  targetPath = path;
  targetImg.src = path;
  cardStage.classList.remove("shuffle");
  void cardStage.offsetWidth;
  cardStage.classList.add("shuffle");
  answers.classList.remove("reveal");
  void answers.offsetWidth;
  answers.classList.add("reveal");
}

function renderAnswers(choices, selectedIndex, correct){
  answers.innerHTML = "";
  choices.forEach((choice,index)=>{
    const el = document.createElement("div");
    let cls = "answer";
    if(selectedIndex === index) cls += " selected";
    if(correct === true && selectedIndex === index) cls += " correct";
    if(correct === false && selectedIndex === index) cls += " wrong";
    el.className = cls;
    el.innerHTML = `<span class="key">${POSE_LABELS[index]})</span><span class="kana">${choice.jp}</span>`;
    answers.appendChild(el);
  });
}

function renderState(s){
  scoreText.textContent = `${s.score} pts`;
  roundText.textContent = `${Math.min(s.round_index,s.rounds_total)} / ${s.rounds_total}`;
  const nextTargetPath = s.target ? s.target.image : "";
  targetMeaning.textContent = s.target ? s.target.meaning : "-";

  const shouldShuffle = s.round_index !== shuffleRound && (s.choices || []).length;
  if(shouldShuffle){
    shuffleRound = s.round_index;
    shuffleTarget(nextTargetPath);
  }else if(nextTargetPath !== targetPath){
    targetPath = nextTargetPath;
    targetImg.src = nextTargetPath;
  }
  const nextSignature = JSON.stringify([
    s.round_index,
    (s.choices || []).map(choice => choice.jp),
    s.selected_index,
    s.correct
  ]);
  if(nextSignature !== answerSignature){
    answerSignature = nextSignature;
    renderAnswers(s.choices || [],s.selected_index,s.correct);
  }

  const progress = s.hold_progress || 0;
  holdFill.style.width = `${Math.max(0,Math.min(100,(progress/15)*100))}%`;
  progressText.textContent = `${progress.toFixed(1)} / 15 s`;

  if(!s.session_started){
    overlay.classList.add("show");overlayMark.textContent="↑";overlayTitle.textContent="RELEASE";
  }else if(s.session_completed){
    overlay.classList.add("show");overlayMark.textContent=s.score;overlayTitle.textContent="FINISH";
  }else{
    overlay.classList.remove("show");
  }

  if(s.needs_release_for_next){
    roundResult.textContent = s.correct ? "CORRECT +10" : "WRONG +5";
    releasePrompt.classList.add("show");
  }else{
    releasePrompt.classList.remove("show");
  }

  if(s.correct === true) messageText.textContent="CORRECT +10";
  else if(s.correct === false) messageText.textContent="WRONG +5";
  else if(s.needs_release_for_next) messageText.textContent="RELEASE";
  else if(s.confirmed_pose && s.confirmed_pose !== "NONE") messageText.textContent=s.confirmed_pose;
  else messageText.textContent="A · B · C · D";
}

function connect(){
  const ws = new WebSocket(WS_URL);
  ws.onmessage = event => renderState(JSON.parse(event.data));
  ws.onclose = () => setTimeout(connect,1000);
}
connect();
</script>
</body>
</html>
